spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "https://rebookk.click"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: rebook-user
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**
        - id: rebook-auth
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**
        - id: rebook-book
          uri: lb://BOOK-SERVICE
          predicates:
            - Path=/api/books/**
        - id: rebook-trading
          uri: lb://TRADING-SERVICE
          predicates:
            - Path=/api/tradings/**
        - id: rebook-notification
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**
        - id: rebook-chat
          uri: lb://CHAT-SERVICE
          predicates:
            - Path=/api/chats/**, /api/ws-chat/**
        - id: rebook-chat-ws
          uri: lb:ws://CHAT-SERVICE
          predicates:
            - Path=/api/ws-chat/**
            - Header=Upgrade, websocket
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

eureka:
  client:
    service-url:
      defaultZone: http://rebook-eureka:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 10
  instance:
    instance-id: ${spring.application.name}:origin
    prefer-ip-address: true